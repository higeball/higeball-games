<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一塁塁審ジャッジメント - Visual Ver.</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #2c5e3b;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        #app {
            background-color: #f4e8d3;
            width: 95%;
            max-width: 400px;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }
        .screen { display: none; }
        .screen.active { display: block; }
        
        h1, h2 { color: #2c5e3b; margin-top: 0;}
        
        input[type="text"] {
            width: 90%;
            padding: 12px;
            font-size: 16px;
            margin: 15px 0;
            border: 2px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        
        button {
            width: 90%;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 5px 0 #999;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active:not(:disabled) {
            transform: translateY(5px);
            box-shadow: none;
        }
        button:disabled {
            background-color: #ccc !important;
            box-shadow: 0 5px 0 #999 !important;
            color: #666 !important;
            cursor: not-allowed;
        }
        
        .btn-start { background-color: #f39c12; color: white; box-shadow: 0 5px 0 #d68910; }
        .btn-out { background-color: #c0392b; color: white; box-shadow: 0 5px 0 #922b21; }
        .btn-safe { background-color: #2980b9; color: white; box-shadow: 0 5px 0 #1f618d; }
        .btn-line { background-color: #06c755; color: white; box-shadow: 0 5px 0 #049c42; }
        .btn-action { background-color: #8e44ad; color: white; box-shadow: 0 5px 0 #732d91; }

        canvas {
            background-color: #dcb37b;
            border: 3px solid #2c5e3b;
            border-radius: 8px;
            width: 100%;
            max-width: 320px;
            height: auto;
            margin: 0 auto 15px auto;
            display: block;
        }

        #judge-controls {
            display: flex;
            justify-content: space-around;
        }
        #judge-controls button {
            width: 45%;
        }
        #result-text {
            font-weight: bold;
            font-size: 16px;
            margin: 10px 0;
            min-height: 24px;
        }
        .runner-info {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-start" class="screen active">
        <h1>一塁塁審<br>ジャッジメント</h1>
        <p>映像を見て判定せよ！<br>ランナーはベースを走り抜けます。</p>
        <input type="text" id="nickname" placeholder="ニックネームを入力">
        <button class="btn-start" onclick="startGame()">ゲームスタート</button>
    </div>

    <div id="screen-quiz" class="screen">
        <h2 id="round-title">第1球</h2>
        <div id="runner-info" class="runner-info"></div>
        
        <canvas id="gameCanvas" width="320" height="200"></canvas>
        
        <button id="btn-play" class="btn-action" onclick="playAnimation()">プレイを見る ▶</button>
        
        <div id="result-text"></div>

        <div id="judge-controls">
            <button id="btn-out" class="btn-out" onclick="answer('アウト')" disabled>アウト！ ✊</button>
            <button id="btn-safe" class="btn-safe" onclick="answer('セーフ')" disabled>セーフ！ 👐</button>
        </div>
        
        <button id="btn-next" class="btn-start" onclick="nextRound()" style="display:none; margin-top:15px; width:100%;">次の判定へ</button>
    </div>

    <div id="screen-result" class="screen">
        <h2>試合終了</h2>
        <div id="result-message" style="margin: 20px 0; font-size: 18px;"></div>
        <button class="btn-line" onclick="shareLine()">LINEで結果をシェア</button>
        <button class="btn-start" onclick="resetGame()" style="margin-top:20px;">もう一度ジャッジする</button>
    </div>
</div>

<script>
    // 問題データ設定（難易度調整済）
    const roundsData = [
        { runnerName: "スズキタカノリ", speedDesc: "中速", runnerBaseFrames: 100, dustMaxRadius: 25 },
        { runnerName: "ヒデノリ", speedDesc: "高速", runnerBaseFrames: 80, dustMaxRadius: 35 },
        { runnerName: "シュウトウ", speedDesc: "超高速", runnerBaseFrames: 60, dustMaxRadius: 45 }
    ];

    let currentRound = 0;
    let score = 0;
    let playerName = "";
    const totalRounds = roundsData.length;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // アニメーション管理用
    let animId = null;
    let isAnimating = false;
    let judgmentFixed = false;
    
    // 座標定義（軌道を明確に分ける）
    const BASE_X = 250, BASE_Y = 100;
    const RUNNER_START_X = 0, RUNNER_START_Y = 210; // 画面左下（ホームベース側）から
    const BALL_START_X = 80, BALL_START_Y = -20;    // 画面左上（サード・ショート側）から
    
    let runner = { x: 0, y: 0, speedX: 0, speedY: 0 };
    let ball = { x: 0, y: 0, speedX: 0, speedY: 0 };
    let trueAnswer = ""; 
    let dustRadius = 0;  
    let roundDustMax = 0; 

    window.onload = () => {
        const savedName = localStorage.getItem('umpire_nickname_v2');
        if (savedName) document.getElementById('nickname').value = savedName;
        drawField();
    };

    function startGame() {
        const nameInput = document.getElementById('nickname').value.trim();
        if (!nameInput) { alert("ニックネームを入力してください"); return; }
        
        playerName = nameInput;
        localStorage.setItem('umpire_nickname_v2', playerName);

        currentRound = 0; score = 0;
        switchScreen('screen-quiz');
        prepareRound();
    }

    function prepareRound() {
        // ★修正点：前回のループが残っていれば確実にキャンセルする
        if (animId !== null) {
            cancelAnimationFrame(animId);
            animId = null;
        }
        isAnimating = false;

        const data = roundsData[currentRound];
        document.getElementById('round-title').innerText = `第 ${currentRound + 1} 球`;
        document.getElementById('runner-info').innerHTML = `打者走者: <strong>${data.runnerName}</strong> (${data.speedDesc})`;
        document.getElementById('result-text').innerText = "「プレイを見る」を押してください";
        
        document.getElementById('btn-play').style.display = 'inline-block';
        document.getElementById('btn-play').disabled = false;
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-out').disabled = true;
        document.getElementById('btn-safe').disabled = true;
        
        // 座標と状態を初期化
        runner.x = RUNNER_START_X; runner.y = RUNNER_START_Y;
        ball.x = BALL_START_X; ball.y = BALL_START_Y;
        dustRadius = 0;
        roundDustMax = data.dustMaxRadius;
        judgmentFixed = false;

        drawField();
    }

    function playAnimation() {
        if (isAnimating) return; // 二重起動防止

        document.getElementById('btn-play').disabled = true;
        document.getElementById('result-text').innerText = "ジャッジ準備...";
        
        const data = roundsData[currentRound];
        
        const runnerFrames = data.runnerBaseFrames;
        // ボールの速度はランナーの速度±5フレームのランダム差で際どくする
        const ballFrames = runnerFrames + (Math.random() * 10 - 5); 

        trueAnswer = (runnerFrames < ballFrames) ? "セーフ" : "アウト";

        runner.speedX = (BASE_X - runner.x) / runnerFrames;
        runner.speedY = (BASE_Y - runner.y) / runnerFrames;
        ball.speedX = (BASE_X - ball.x) / ballFrames;
        ball.speedY = (BASE_Y - ball.y) / ballFrames;

        isAnimating = true;
        update();
    }

    function update() {
        if (!isAnimating) return;

        runner.x += runner.speedX; runner.y += runner.speedY;
        ball.x += ball.speedX; ball.y += ball.speedY;

        const distRunner = Math.hypot(BASE_X - runner.x, BASE_Y - runner.y);
        const distBall = Math.hypot(BASE_X - ball.x, BASE_Y - ball.y);

        if (!judgmentFixed) {
            if (distRunner < 40 || distBall < 40) {
                dustRadius = Math.min(dustRadius + 1.5, roundDustMax);
            }
            
            // どちらかがベースに到着したタイミング
            if (distRunner < 5 || distBall < 5) {
                judgmentFixed = true;
                document.getElementById('btn-out').disabled = false;
                document.getElementById('btn-safe').disabled = false;
                document.getElementById('result-text').innerText = "ジャッジせよ！";
            }
        }

        // ランナーが画面外（右側）に走り抜けたらアニメーション停止
        if (runner.x > canvas.width + 20) {
            isAnimating = false;
            drawField();
            
            if (!judgmentFixed) {
                judgmentFixed = true;
                trueAnswer = "セーフ"; 
                document.getElementById('btn-out').disabled = false;
                document.getElementById('btn-safe').disabled = false;
                document.getElementById('result-text').innerText = "ジャッジせよ！";
            }
            return;
        }

        drawField();
        animId = requestAnimationFrame(update);
    }

    function drawField() {
        ctx.fillStyle = '#dcb37b'; ctx.fillRect(0, 0, canvas.width, canvas.height);

        // ファーストライン（ランナーの軌道に合わせる）
        ctx.beginPath(); 
        ctx.moveTo(0, 210); 
        ctx.lineTo(320, 69); // 右端まで線を伸ばす
        ctx.strokeStyle = 'white'; 
        ctx.lineWidth = 3; 
        ctx.stroke();

        // ベース
        ctx.fillStyle = 'white'; ctx.beginPath();
        ctx.moveTo(BASE_X, BASE_Y - 10); ctx.lineTo(BASE_X + 15, BASE_Y);
        ctx.lineTo(BASE_X, BASE_Y + 10); ctx.lineTo(BASE_X - 15, BASE_Y); ctx.fill();

        // 砂埃
        if (dustRadius > 0) {
            ctx.fillStyle = `rgba(200, 190, 170, ${judgmentFixed ? 0.4 : 0.8})`; 
            ctx.beginPath(); ctx.arc(BASE_X, BASE_Y, dustRadius, 0, Math.PI * 2); ctx.fill();
        }

        // ボール（白）
        ctx.fillStyle = '#ffffff'; ctx.beginPath();
        ctx.arc(ball.x, ball.y, 5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.stroke();

        // ランナー（青）
        ctx.fillStyle = '#2980b9'; ctx.beginPath();
        ctx.arc(runner.x, runner.y, 8, 0, Math.PI * 2); ctx.fill();
    }

    function answer(playerChoice) {
        document.getElementById('btn-out').disabled = true;
        document.getElementById('btn-safe').disabled = true;

        const resultTextObj = document.getElementById('result-text');
        
        if (playerChoice === trueAnswer) {
            resultTextObj.innerHTML = `<span style="color:#27ae60;">正解！実際の判定は「${trueAnswer}」です。</span>`;
            score++;
        } else {
            resultTextObj.innerHTML = `<span style="color:#c0392b;">ミスジャッジ！実際の判定は「${trueAnswer}」です。</span>`;
        }

        document.getElementById('btn-next').style.display = 'block';
    }

    function nextRound() {
        currentRound++;
        if (currentRound >= totalRounds) { showResult(); } else { prepareRound(); }
    }

    function showResult() {
        let comment = "";
        if (score === 3) comment = "名審判誕生！動体視力抜群です！";
        else if (score === 2) comment = "惜しい！あと少しで一軍レベル！";
        else if (score === 1) comment = "まだまだ修行が必要ですね。";
        else comment = "大ブーイング！砂埃に騙されすぎです。";

        document.getElementById('result-message').innerHTML = 
            `<strong>${playerName}</strong> 審判の成績<br><br>
            <span style="font-size:28px; color:#c0392b; font-weight:bold;">${totalRounds}球中 ${score}球 正解</span><br><br>
            ${comment}`;

        switchScreen('screen-result');
    }

    function shareLine() {
        const text = `${playerName}は一塁塁審としてクロスプレイの視覚判定に挑み、${totalRounds}問中${score}問正解しました！\n#一塁塁審ジャッジメント`;
        const url = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
        window.open(url, '_blank');
    }

    function resetGame() { switchScreen('screen-start'); }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }
</script>

</body>
</html>
