<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一塁塁審ジャッジメント - 16bit Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'DotGothic16', sans-serif;
            background-color: #222; 
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        
        #app {
            background-color: #000;
            width: 95%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            border: 4px solid #fff;
            border-radius: 8px;
            box-shadow: 0 0 0 2px #000, 0 0 0 4px #fff, inset 0 0 0 2px #fff;
        }

        .screen { display: none; }
        .screen.active { display: block; }
        
        h1, h2 { 
            color: #fff; 
            margin-top: 0;
            text-shadow: 2px 2px 0 #888;
        }
        
        input[type="text"] {
            font-family: 'DotGothic16', sans-serif;
            width: 90%;
            padding: 12px;
            font-size: 16px;
            margin: 15px 0;
            background-color: #000;
            color: #fff;
            border: 2px solid #fff;
            box-sizing: border-box;
        }
        input[type="text"]:focus { outline: none; border-color: #f39c12; }
        
        button {
            font-family: 'DotGothic16', sans-serif;
            width: 90%;
            padding: 12px;
            font-size: 18px;
            margin: 8px 0;
            background-color: #000;
            color: #fff;
            border: 2px solid #fff;
            cursor: pointer;
            text-align: left;
            padding-left: 20px;
            position: relative;
        }
        button:before {
            content: "";
            position: absolute;
            left: 5px;
            opacity: 0;
        }
        button:hover:not(:disabled):before,
        button:active:not(:disabled):before {
            content: "▶"; 
            opacity: 1;
        }
        button:active:not(:disabled) {
            background-color: #333;
        }
        button:disabled {
            color: #666;
            border-color: #666;
            cursor: not-allowed;
        }
        
        .btn-share { border-color: #3498db; color: #3498db; }

        canvas {
            background-color: #a06a3f; 
            border: 2px solid #fff;
            width: 100%;
            max-width: 320px;
            height: auto;
            margin: 0 auto 15px auto;
            display: block;
            image-rendering: pixelated; 
        }

        #judge-controls {
            display: flex;
            justify-content: space-between;
        }
        #judge-controls button {
            width: 48%;
            text-align: center;
            padding-left: 0;
        }
        #judge-controls button:before { display: none; } 

        #result-text {
            font-size: 18px;
            margin: 10px 0;
            min-height: 24px;
            white-space: pre-wrap; 
        }
        .runner-info {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-start" class="screen active">
        <h1>ｲﾁﾙｲﾙｲｼﾝ<br>ｼﾞｬｯｼﾞﾒﾝﾄ</h1>
        <p>えいぞうをみて はんていせよ！<br>ボールは 1るいに とまるぞ。</p>
        <input type="text" id="nickname" placeholder="なまえをいれてね">
        <button onclick="startGame()">▶ ゲームスタート</button>
    </div>

    <div id="screen-quiz" class="screen">
        <h2 id="round-title">だい 1 きゅう</h2>
        <div id="runner-info" class="runner-info"></div>
        
        <canvas id="gameCanvas" width="320" height="200"></canvas>
        
        <button id="btn-play" onclick="playAnimation()">▶ プレイをみる</button>
        
        <div id="result-text"></div>

        <div id="judge-controls">
            <button id="btn-out" onclick="answer('アウト')" disabled>アウト</button>
            <button id="btn-safe" onclick="answer('セーフ')" disabled>セーフ</button>
        </div>
        
        <button id="btn-next" onclick="nextRound()" style="display:none; margin-top:15px; width:100%;">▶ つぎのプレイへ</button>
    </div>

    <div id="screen-result" class="screen">
        <h2>しあいしゅうりょう</h2>
        <div id="result-message" style="margin: 20px 0; font-size: 18px; line-height: 1.6; text-align: left;"></div>
        <button id="btn-share" class="btn-share" onclick="shareResultImage()">▶ がぞう で シェアする</button>
        <button onclick="resetGame()" style="margin-top:20px;">▶ もういちど ジャッジする</button>
    </div>
</div>

<script>
    const roundsData = [
        { runnerName: "スズキタカノリ", speedDesc: "ふつう", runnerBaseFrames: 100, dustMaxRadius: 24 },
        { runnerName: "ヒデノリ", speedDesc: "はやい", runnerBaseFrames: 80, dustMaxRadius: 32 },
        { runnerName: "シュウトウ", speedDesc: "シンソク！！", runnerBaseFrames: 30, dustMaxRadius: 40 }
    ];

    let currentRound = 0;
    let score = 0;
    let playerName = "";
    const totalRounds = roundsData.length;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    
    let animId = null;
    let isAnimating = false;
    let judgmentFixed = false;
    let frameCount = 0; 
    let ballArrivalFrame = 0; 
    
    const BASE_X = 250, BASE_Y = 100;
    const RUNNER_START_X = 0, RUNNER_START_Y = 210;
    const BALL_START_X = 80, BALL_START_Y = -20;
    
    let runner = { x: 0, y: 0, speedX: 0, speedY: 0 };
    let ball = { x: 0, y: 0, speedX: 0, speedY: 0 };
    let trueAnswer = ""; 
    let dustRadius = 0;  
    let roundDustMax = 0; 

    // フォントの読み込み完了を待つ（画像生成時にフォントが当たらないのを防ぐため）
    document.fonts.ready.then(() => {
        console.log("Fonts loaded.");
    });

    window.onload = () => {
        const savedName = localStorage.getItem('umpire_nickname_v2');
        if (savedName) document.getElementById('nickname').value = savedName;
        drawField();
    };

    function startGame() {
        const nameInput = document.getElementById('nickname').value.trim();
        if (!nameInput) { alert("なまえをいれてください"); return; }
        
        playerName = nameInput;
        localStorage.setItem('umpire_nickname_v2', playerName);

        currentRound = 0; score = 0;
        switchScreen('screen-quiz');
        prepareRound();
    }

    function prepareRound() {
        if (animId !== null) {
            cancelAnimationFrame(animId);
            animId = null;
        }
        isAnimating = false;
        frameCount = 0;

        const data = roundsData[currentRound];
        document.getElementById('round-title').innerText = `だい ${currentRound + 1} きゅう`;
        document.getElementById('runner-info').innerHTML = `だしゃそうしゃ: ${data.runnerName} (${data.speedDesc})`;
        document.getElementById('result-text').innerText = "「プレイをみる」をおしてね";
        
        document.getElementById('btn-play').style.display = 'block';
        document.getElementById('btn-play').disabled = false;
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-out').disabled = true;
        document.getElementById('btn-safe').disabled = true;
        
        runner.x = RUNNER_START_X; runner.y = RUNNER_START_Y;
        ball.x = BALL_START_X; ball.y = BALL_START_Y;
        dustRadius = 0;
        roundDustMax = data.dustMaxRadius;
        judgmentFixed = false;

        drawField();
    }

    function playAnimation() {
        if (isAnimating) return; 

        document.getElementById('btn-play').disabled = true;
        document.getElementById('result-text').innerText = "ジャッジの じゅんびを せよ...";
        
        const data = roundsData[currentRound];
        const runnerFrames = data.runnerBaseFrames;
        
        ballArrivalFrame = Math.floor(runnerFrames + (Math.random() * 6 - 3)); 

        if (runnerFrames < ballArrivalFrame) {
            trueAnswer = "セーフ";
        } else if (ballArrivalFrame < runnerFrames) {
            trueAnswer = "アウト";
        } else {
            trueAnswer = "アウト";
        }

        runner.speedX = (BASE_X - runner.x) / runnerFrames;
        runner.speedY = (BASE_Y - runner.y) / runnerFrames;
        ball.speedX = (BASE_X - ball.x) / ballArrivalFrame;
        ball.speedY = (BASE_Y - ball.y) / ballArrivalFrame;

        isAnimating = true;
        update();
    }

    function update() {
        if (!isAnimating) return;
        frameCount++;

        runner.x += runner.speedX; runner.y += runner.speedY;
        
        if (frameCount < ballArrivalFrame) {
            ball.x += ball.speedX; ball.y += ball.speedY;
        } else {
            ball.x = BASE_X; ball.y = BASE_Y;
        }

        const distRunner = Math.hypot(BASE_X - runner.x, BASE_Y - runner.y);
        const distBall = Math.hypot(BASE_X - ball.x, BASE_Y - ball.y);

        if (!judgmentFixed) {
            if (distRunner < 40 || distBall < 40) {
                dustRadius = Math.min(dustRadius + 1.5, roundDustMax);
            }
            
            const runnerArrived = frameCount >= roundsData[currentRound].runnerBaseFrames;
            const ballArrived = frameCount >= ballArrivalFrame;

            if (runnerArrived || ballArrived) {
                judgmentFixed = true;
                document.getElementById('btn-out').disabled = false;
                document.getElementById('btn-safe').disabled = false;
                document.getElementById('result-text').innerText = "ジャッジせよ！";
            }
        }

        if (runner.x > canvas.width + 20) {
            isAnimating = false;
            drawField(); 
            
            if (!judgmentFixed) {
                judgmentFixed = true;
                trueAnswer = "セーフ"; 
                document.getElementById('btn-out').disabled = false;
                document.getElementById('btn-safe').disabled = false;
                document.getElementById('result-text').innerText = "ジャッジせよ！";
            }
            return;
        }

        drawField();
        animId = requestAnimationFrame(update);
    }

    function drawField() {
        ctx.fillStyle = '#a06a3f'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#fff';
        for(let i=0; i<320; i+=4) {
            ctx.fillRect(i, 210 - (i*0.35), 4, 4);
        }

        ctx.fillStyle = '#fff'; 
        ctx.fillRect(BASE_X - 12, BASE_Y - 6, 24, 12);
        ctx.fillStyle = '#ccc'; 
        ctx.fillRect(BASE_X - 12, BASE_Y + 6, 24, 4);

        if (dustRadius > 0) {
            ctx.fillStyle = `rgba(200, 190, 170, ${judgmentFixed ? 0.4 : 0.8})`; 
            let r = Math.floor(dustRadius);
            ctx.fillRect(BASE_X - r, BASE_Y - r/2, r*2, r);
            ctx.fillRect(BASE_X - r/2, BASE_Y - r, r, r*2);
        }

        ctx.fillStyle = '#fff';
        ctx.fillRect(Math.floor(ball.x) - 3, Math.floor(ball.y) - 3, 6, 6);
        ctx.fillStyle = '#aaa'; 
        ctx.fillRect(Math.floor(ball.x) - 3, Math.floor(ball.y) + 3, 6, 2);

        drawRunner(Math.floor(runner.x), Math.floor(runner.y));
    }

    function drawRunner(rx, ry) {
        const animState = Math.floor(frameCount / 6) % 2; 

        ctx.fillStyle = '#f1c40f'; 
        ctx.fillRect(rx - 6, ry - 18, 12, 10);
        ctx.fillStyle = '#e67e22'; 
        ctx.fillRect(rx - 4, ry - 10, 8, 6);

        ctx.fillStyle = '#2980b9';
        ctx.fillRect(rx - 8, ry - 4, 16, 12);

        ctx.fillStyle = '#fff';
        if (animState === 0) {
            ctx.fillRect(rx - 12, ry - 4, 4, 10); 
            ctx.fillRect(rx + 8, ry - 4, 4, 8);   
        } else {
            ctx.fillRect(rx - 10, ry - 4, 4, 8);  
            ctx.fillRect(rx + 6, ry - 4, 4, 10);  
        }

        ctx.fillStyle = '#ecf0f1';
        if (animState === 0) {
            ctx.fillRect(rx - 6, ry + 8, 6, 8);  
            ctx.fillRect(rx + 2, ry + 8, 4, 6);  
        } else {
            ctx.fillRect(rx - 4, ry + 8, 4, 6);  
            ctx.fillRect(rx + 2, ry + 8, 6, 8);  
        }
    }

    function answer(playerChoice) {
        document.getElementById('btn-out').disabled = true;
        document.getElementById('btn-safe').disabled = true;

        const resultTextObj = document.getElementById('result-text');
        
        if (playerChoice === trueAnswer) {
            resultTextObj.innerHTML = `<span style="color:#2ecc71;">せいかい！\nほんとうの はんていは「${trueAnswer}」だ！</span>`;
            score++;
        } else {
            resultTextObj.innerHTML = `<span style="color:#e74c3c;">ミスジャッジ！\nほんとうの はんていは「${trueAnswer}」だ！</span>`;
        }

        document.getElementById('btn-next').style.display = 'block';
    }

    function nextRound() {
        currentRound++;
        if (currentRound >= totalRounds) { showResult(); } else { prepareRound(); }
    }

    function showResult() {
        let comment = "";
        if (score === 3) comment = "めいしんぱん たんじょう！<br>どうたいしりょくは ばつぐんだ！";
        else if (score === 2) comment = "おしい！<br>あとすこしで １ぐんレベルだ！";
        else if (score === 1) comment = "まだまだ しゅぎょうが たりないようだ。";
        else comment = "だいブーイング！<br>すなぼこりに だまされすぎだぞ。";

        document.getElementById('result-message').innerHTML = 
            `＊ <strong>${playerName}</strong> しんぱん の せいせき ＊<br><br>
            <span style="color:#e74c3c; font-size:24px;">${totalRounds}きゅう ちゅう ${score}きゅう せいかい</span><br><br>
            ${comment}`;

        switchScreen('screen-result');
    }

    // --- 画像生成とシェア機能 ---
    async function shareResultImage() {
        const btn = document.getElementById('btn-share');
        btn.innerText = "がぞう を つくっています...";
        btn.disabled = true;

        // 1. RPGのステータス画面風の画像を裏側で描画するキャンバスを作成
        const shareCanvas = document.createElement('canvas');
        shareCanvas.width = 400;
        shareCanvas.height = 300;
        const sCtx = shareCanvas.getContext('2d');
        sCtx.imageSmoothingEnabled = false;

        // 背景とウィンドウ枠
        sCtx.fillStyle = '#000';
        sCtx.fillRect(0, 0, 400, 300);
        sCtx.strokeStyle = '#fff';
        sCtx.lineWidth = 4;
        sCtx.strokeRect(10, 10, 380, 280);
        sCtx.strokeRect(16, 16, 368, 268);

        // テキスト描画
        sCtx.font = "24px 'DotGothic16', sans-serif";
        sCtx.fillStyle = '#fff';
        sCtx.fillText("＊ しんぱん ステータス ＊", 30, 60);

        sCtx.font = "20px 'DotGothic16', sans-serif";
        sCtx.fillText(`なまえ：${playerName}`, 30, 110);
        sCtx.fillText(`せいせき：${totalRounds}きゅう ちゅう ${score}きゅう せいかい`, 30, 150);

        let rank = "";
        if (score === 3) rank = "めいしんぱん";
        else if (score === 2) rank = "１ぐん はんていいん";
        else if (score === 1) rank = "みならい しんぱん";
        else rank = "２ぐんおち";

        sCtx.fillStyle = '#f39c12';
        sCtx.fillText(`しょうごう：${rank}`, 30, 190);

        sCtx.fillStyle = '#ccc';
        sCtx.font = "16px 'DotGothic16', sans-serif";
        sCtx.fillText("#一塁塁審ジャッジメント", 30, 260);

        // 2. キャンバスを画像(Blob)に変換
        shareCanvas.toBlob(async (blob) => {
            // 画像シェアがサポートされているかチェック
            const file = new File([blob], "judgement.png", { type: "image/png" });
            const data = {
                text: `${playerName}の判定結果！ #一塁塁審ジャッジメント`,
                files: [file]
            };

            if (navigator.canShare && navigator.canShare(data)) {
                try {
                    // スマホ標準のシェアシートを呼び出す（ここでLINEなどを選べる）
                    await navigator.share(data);
                } catch (err) {
                    console.log("シェアがキャンセルされました", err);
                }
            } else {
                // PCブラウザなどで非対応の場合のフォールバック（旧テキストシェア）
                alert("お使いのブラウザは画像シェアにひたいおうのため、テキストでシェアします。");
                const text = `${playerName}は １るいるいしん として はんていに いどみ、${totalRounds}もんちゅう ${score}もん せいかいした！\n#一塁塁審ジャッジメント`;
                const url = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
                window.open(url, '_blank');
            }

            btn.innerText = "▶ がぞう で シェアする";
            btn.disabled = false;
        });
    }

    function resetGame() { switchScreen('screen-start'); }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }
</script>

</body>
</html>
