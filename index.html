<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>HIGEBALL QUEST</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone">
      <div id="game-root" aria-label="HIGEBALL QUEST game canvas"></div>
      <section class="controls" aria-label="game controls">
        <div class="dpad" aria-label="direction pad">
          <button data-dir="up" class="up" aria-label="up" tabindex="-1">▲</button>
          <button data-dir="left" class="left" aria-label="left" tabindex="-1">◀</button>
          <button data-dir="right" class="right" aria-label="right" tabindex="-1">▶</button>
          <button data-dir="down" class="down" aria-label="down" tabindex="-1">▼</button>
        </div>
        <div class="actions">
          <button id="btn-b" aria-label="B button" tabindex="-1">B</button>
          <button id="btn-a" aria-label="A button" tabindex="-1">A</button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
