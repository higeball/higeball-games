<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ネオン スネーク | Higeball Games</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #39ff14; /* Neon Green */
            --secondary: #ff007f; /* Neon Pink */
            --dark: #0a0a16;
            --text: #f1f1f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            touch-action: none;
            overscroll-behavior: none;
        }

        #game-container {
            position: relative;
            background-color: var(--dark);
            border: 4px solid var(--primary);
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.4);
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 720px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            flex: 1;
            background-color: #05050f;
        }

        /* Responsive swipe area reminder at bottom */
        #touch-panels {
            width: 100%;
            height: 80px;
            background-color: #0c0b1c;
            border-top: 3px solid rgba(57, 255, 20, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .swipe-hint {
            font-size: 11px;
            color: #8888b0;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Screen overlays */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 22, 0.9);
            z-index: 10;
            padding: 30px;
        }

        .menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 320px;
        }

        .game-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 20px;
            color: #fff;
            text-shadow: 0 0 8px var(--primary), 0 0 15px var(--primary);
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.5;
        }

        .game-title span {
            color: var(--secondary);
            text-shadow: 0 0 8px var(--secondary), 0 0 15px var(--secondary);
        }

        input[type="text"] {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 16px;
            font-weight: bold;
            padding: 14px;
            width: 100%;
            background-color: #060510;
            color: #fff;
            border: 2px solid var(--primary);
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            outline: none;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
        }

        .menu-btn {
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #2bbc10);
            color: #000;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
            box-shadow: 0 4px 15px rgba(57, 255, 20, 0.4);
            text-align: center;
        }

        .menu-btn:active {
            transform: scale(0.98);
        }

        #controls-info {
            margin-top: 20px;
            font-size: 11px;
            color: #a0a0cf;
            line-height: 1.8;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #back-link {
            margin-top: 25px;
            color: var(--secondary);
            text-decoration: none;
            font-size: 12px;
            border-bottom: 1px dotted var(--secondary);
            padding-bottom: 2px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="300" height="360"></canvas>
        
        <div id="touch-panels">
            <span class="swipe-hint">◀ SWIPE SCREEN TO CONTROL ▶</span>
        </div>

        <div id="ui-overlay">
            <!-- START SCREEN -->
            <div id="screen-start" class="menu-screen">
                <div class="game-title">NEON<br>SNEAK<br><span>SNAKE</span></div>
                <div id="player-display" style="display: none; font-size: 16px; margin-bottom: 20px; font-weight: bold; color: var(--secondary);">PLAYER: <span id="player-name-text"></span></div>
                <input type="text" id="nickname" placeholder="なまえをいれてね" maxlength="10">
                <button class="menu-btn" onclick="startGame()">ゲームスタート</button>
                <div id="controls-info">
                    【操作方法】<br>
                    画面をスワイプ（上下左右に弾く）してヘビの移動方向を変更！<br>
                    ・赤いネオンエサを食べると体が伸びます<br>
                    ・外壁や自分の体にぶつかるとゲームオーバーです<br>
                    ※PCキーボード（方向キー / WASDキー）も対応しています。
                </div>
                <a href="#" onclick="goHome(); return false;" id="back-link">BACK TO HUB</a>
            </div>

            <!-- RESULT SCREEN -->
            <div id="screen-result" class="menu-screen" style="display:none;">
                <div class="game-title" id="result-title">GAME OVER</div>
                <div id="result-message" style="margin: 15px 0; font-size: 14px; line-height: 1.8; color: #fff; width: 100%; text-align: left;"></div>
                <button class="menu-btn" id="btn-share" onclick="shareResultImage()" style="color: #fff;">▶ 結果を画像でシェアする</button>
                <button class="menu-btn" onclick="resetGame()" style="background: linear-gradient(135deg, var(--secondary), #00b0df); box-shadow: 0 4px 15px rgba(0, 240, 255, 0.4); color: #fff;">▶ もう一度挑戦する</button>
                <button class="menu-btn" onclick="goHome()" style="background: linear-gradient(135deg, #a0a0cf, #7070a0); box-shadow: 0 4px 15px rgba(160, 160, 207, 0.4); margin-top: 10px; color: #fff;">▶ ホームに戻る</button>
            </div>
        </div>
    </div>

<script>
    // --- Audio System ---
    class SoundFX {
        constructor() {
            this.ctx = null;
            this.failed = false;
        }
        init() {
            if (this.failed) return;
            if (!this.ctx) {
                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    if (AudioContextClass) this.ctx = new AudioContextClass();
                    else this.failed = true;
                } catch(e) { this.failed = true; }
            }
        }
        playTone(freq, duration, type = 'square', timeOffset = 0) {
            this.init();
            if (this.failed || !this.ctx) return;
            try {
                let now = this.ctx.currentTime + timeOffset;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + duration);
            } catch(e){}
        }
        playEat() { this.playTone(523, 0.06, 'triangle'); this.playTone(784, 0.08, 'triangle', 0.05); }
        playCrash() { this.playTone(180, 0.25, 'sawtooth'); }
    }
    const sound = new SoundFX();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let gameState = 'MENU';
    let playerName = "";
    let score = 0;
    let highscore = 0;

    // Grid size parameters (300 width / 15px per cell = 20 columns, 360 height / 15px = 24 rows)
    const gridSize = 15;
    const cols = canvas.width / gridSize;
    const rows = canvas.height / gridSize;

    let snake = [];
    let dir = { x: 1, y: 0 };
    let nextDir = { x: 1, y: 0 };
    let food = { x: 0, y: 0 };
    let gameInterval = null;

    // Keyboard handlers
    window.addEventListener('keydown', e => {
        if (gameState !== 'PLAYING') return;
        if ((e.code === 'ArrowUp' || e.code === 'KeyW') && dir.y === 0) { nextDir = { x: 0, y: -1 }; }
        if ((e.code === 'ArrowDown' || e.code === 'KeyS') && dir.y === 0) { nextDir = { x: 0, y: 1 }; }
        if ((e.code === 'ArrowLeft' || e.code === 'KeyA') && dir.x === 0) { nextDir = { x: -1, y: 0 }; }
        if ((e.code === 'ArrowRight' || e.code === 'KeyD') && dir.x === 0) { nextDir = { x: 1, y: 0 }; }
    });

    // Touch Swipe Handlers (Flick)
    let touchStartX = 0;
    let touchStartY = 0;

    const handleTouchStart = (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    };

    const handleTouchMove = (e) => {
        if (gameState !== 'PLAYING') return;
        e.preventDefault(); // prevent default scroll
    };

    const handleTouchEnd = (e) => {
        if (gameState !== 'PLAYING') return;
        let touchEndX = e.changedTouches[0].clientX;
        let touchEndY = e.changedTouches[0].clientY;

        let dx = touchEndX - touchStartX;
        let dy = touchEndY - touchStartY;
        let absDx = Math.abs(dx);
        let absDy = Math.abs(dy);

        // Threshold of 30px swipe
        if (Math.max(absDx, absDy) > 30) {
            if (absDx > absDy) {
                // Horizontal swipe
                if (dx > 0 && dir.x === 0) nextDir = { x: 1, y: 0 };
                else if (dx < 0 && dir.x === 0) nextDir = { x: -1, y: 0 };
            } else {
                // Vertical swipe
                if (dy > 0 && dir.y === 0) nextDir = { x: 0, y: 1 };
                else if (dy < 0 && dir.y === 0) nextDir = { x: 0, y: -1 };
            }
        }
    };

    canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
    canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
    canvas.addEventListener('touchend', handleTouchEnd, { passive: false });

    // Click swipe simulator for desktop mouse testing
    let mouseStartX = 0;
    let mouseStartY = 0;
    canvas.addEventListener('mousedown', e => {
        mouseStartX = e.clientX;
        mouseStartY = e.clientY;
    });
    canvas.addEventListener('mouseup', e => {
        if (gameState !== 'PLAYING') return;
        let dx = e.clientX - mouseStartX;
        let dy = e.clientY - mouseStartY;
        let absDx = Math.abs(dx);
        let absDy = Math.abs(dy);
        if (Math.max(absDx, absDy) > 25) {
            if (absDx > absDy) {
                if (dx > 0 && dir.x === 0) nextDir = { x: 1, y: 0 };
                else if (dx < 0 && dir.x === 0) nextDir = { x: -1, y: 0 };
            } else {
                if (dy > 0 && dir.y === 0) nextDir = { x: 0, y: 1 };
                else if (dy < 0 && dir.y === 0) nextDir = { x: 0, y: -1 };
            }
        }
    });

    window.onload = () => {
        const savedName = localStorage.getItem('umpire_nickname_v2');
        if (savedName && savedName.trim() !== "") {
            document.getElementById('nickname').style.display = 'none';
            document.getElementById('player-name-text').innerText = savedName;
            document.getElementById('player-display').style.display = 'block';
            document.getElementById('nickname').value = savedName;
        }
        ctx.fillStyle = '#0c0a1f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    };

    function goHome() {
        if (window.parent && typeof window.parent.closeGame === 'function') {
            window.parent.closeGame();
        } else {
            window.location.href = '../../index.html';
        }
    }

    function startGame() {
        const savedName = localStorage.getItem('umpire_nickname_v2');
        let nameInput = "";
        if (savedName && savedName.trim() !== "") {
            nameInput = savedName;
        } else {
            nameInput = document.getElementById('nickname').value.trim();
        }
        if (!nameInput) { alert("なまえをいれてね！"); return; }
        playerName = nameInput;
        localStorage.setItem('umpire_nickname_v2', playerName);
        document.getElementById('ui-overlay').style.display = 'none';

        gameState = 'PLAYING';
        score = 0;
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        
        // Init snake at center
        snake = [
            { x: 10, y: 12 },
            { x: 9, y: 12 },
            { x: 8, y: 12 }
        ];

        spawnFood();

        sound.init();
        if (gameInterval) clearInterval(gameInterval);
        
        // Game tick runs at 130ms (8-bit speed)
        gameInterval = setInterval(gameStep, 130);
    }

    function spawnFood() {
        let valid = false;
        while (!valid) {
            food.x = Math.floor(Math.random() * cols);
            food.y = Math.floor(Math.random() * rows);
            
            // Check if food spawns inside snake
            valid = true;
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === food.x && snake[i].y === food.y) {
                    valid = false;
                    break;
                }
            }
        }
    }

    function gameStep() {
        if (gameState !== 'PLAYING') return;

        // Apply next direction
        dir = nextDir;

        // Calculate new head position
        let head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        // Outer wall collision check
        if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
            triggerGameOver();
            return;
        }

        // Self collision check
        for (let i = 0; i < snake.length; i++) {
            if (snake[i].x === head.x && snake[i].y === head.y) {
                triggerGameOver();
                return;
            }
        }

        // Add new head
        snake.unshift(head);

        // Check food collision
        if (head.x === food.x && head.y === food.y) {
            score++;
            sound.playEat();
            spawnFood();
        } else {
            // Remove tail if didn't eat food
            snake.pop();
        }

        render();
    }

    function triggerGameOver() {
        gameState = 'GAMEOVER';
        clearInterval(gameInterval);
        sound.playCrash();
        if (score > highscore) highscore = score;

        document.getElementById('ui-overlay').style.display = 'flex';
        document.getElementById('screen-start').style.display = 'none';
        document.getElementById('screen-result').style.display = 'flex';

        let earnedPoints = score * 100;
        if (window.parent && typeof window.parent.addPoints === 'function') {
            window.parent.addPoints(earnedPoints);
        }

        document.getElementById('result-message').innerHTML = 
            `＊ <strong>${playerName}</strong> 選手の記録 ＊<br><br>
            獲得スコア: <span style="color:var(--primary); font-size:16px;">${score} 点</span><br>
            獲得ポイント: <span style="color:#ffdd00; font-size:14px; font-weight:700;">+${earnedPoints} pt</span><br>
            自己ベスト: <span style="color:var(--secondary); font-size:14px; font-weight:700;">${highscore} 点</span>`;
    }

    function render() {
        ctx.fillStyle = '#05050f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw grid boundaries (faint grid)
        ctx.strokeStyle = 'rgba(57, 255, 20, 0.04)';
        ctx.lineWidth = 1;
        for (let x = 0; x < canvas.width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += 15) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // Draw food (neon pink pulsing box)
        ctx.fillStyle = varColor('--secondary');
        ctx.fillRect(food.x * gridSize + 1, food.y * gridSize + 1, gridSize - 2, gridSize - 2);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.strokeRect(food.x * gridSize + 1, food.y * gridSize + 1, gridSize - 2, gridSize - 2);

        // Draw snake (glowing neon green)
        for (let i = 0; i < snake.length; i++) {
            let s = snake[i];
            ctx.fillStyle = i === 0 ? '#5eff3a' : varColor('--primary'); // Head is slightly lighter
            ctx.fillRect(s.x * gridSize + 1, s.y * gridSize + 1, gridSize - 2, gridSize - 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 0.8;
            ctx.strokeRect(s.x * gridSize + 1, s.y * gridSize + 1, gridSize - 2, gridSize - 2);
        }

        // HUD Score
        ctx.font = '10px "Press Start 2P"';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'left';
        ctx.fillText(`SCORE: ${score}`, 15, 25);
    }

    function varColor(vName) { return getComputedStyle(document.documentElement).getPropertyValue(vName).trim(); }

    async function shareResultImage() {
        const btn = document.getElementById('btn-share');
        btn.innerText = "作成中...";
        btn.disabled = true;

        const shareCanvas = document.createElement('canvas');
        shareCanvas.width = 400;
        shareCanvas.height = 300;
        const sCtx = shareCanvas.getContext('2d');

        sCtx.fillStyle = '#0a0a16';
        sCtx.fillRect(0, 0, 400, 300);
        sCtx.strokeStyle = '#39ff14';
        sCtx.lineWidth = 4;
        sCtx.strokeRect(10, 10, 380, 280);

        sCtx.font = "bold 20px 'Press Start 2P'";
        sCtx.fillStyle = '#fff';
        sCtx.fillText("CYBER SNAKE", 35, 60);

        sCtx.font = "bold 13px 'Noto Sans JP'";
        sCtx.fillText(`名前　: ${playerName}`, 35, 110);
        sCtx.fillText(`スコア: ${score} 点`, 35, 150);
        sCtx.fillText(`最高　: ${highscore} 点`, 35, 190);

        sCtx.fillStyle = '#39ff14';
        sCtx.font = "14px 'Noto Sans JP'";
        sCtx.fillText("#ネオンスネーク #HigeballGames", 35, 260);

        shareCanvas.toBlob(async (blob) => {
            const file = new File([blob], "snake_result.png", { type: "image/png" });
            const data = { text: `${playerName}のネオンスネークスコア！ ${score}点獲得！ #HigeballGames`, files: [file] };

            if (navigator.canShare && navigator.canShare(data)) {
                try { await navigator.share(data); } catch (err) {}
            } else {
                alert("テキストでシェアします。");
                const text = `${playerName}はネオンスネークで ${score}点を獲得した！\n#HigeballGames`;
                window.open(`https://line.me/R/msg/text/?${encodeURIComponent(text)}`, '_blank');
            }
            btn.innerText = "▶ 結果を画像でシェアする";
            btn.disabled = false;
        });
    }

    function resetGame() {
        document.getElementById('screen-start').style.display = 'flex';
        document.getElementById('screen-result').style.display = 'none';
        document.getElementById('ui-overlay').style.display = 'flex';
        
        const savedName = localStorage.getItem('umpire_nickname_v2');
        if (savedName && savedName.trim() !== "") {
            document.getElementById('nickname').style.display = 'none';
            document.getElementById('player-name-text').innerText = savedName;
            document.getElementById('player-display').style.display = 'block';
            document.getElementById('nickname').value = savedName;
        } else {
            document.getElementById('nickname').style.display = 'block';
            document.getElementById('player-display').style.display = 'none';
            document.getElementById('nickname').value = '';
        }
        
        ctx.fillStyle = '#0c0a1f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
</script>

</body>
</html>
