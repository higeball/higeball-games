<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一塁塁審ジャッジメント | Higeball Games</title>
    <!-- Google Fonts for Retro style -->
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --fc-red: #8a1c14;
            --fc-gold: #c5a059;
            --fc-dark: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DotGothic16', sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            touch-action: none; /* Prevent browser pinch and scroll */
            overscroll-behavior: none;
        }

        #game-container {
            position: relative;
            background-color: #000;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 512px;
            display: flex;
            flex-direction: column;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            background-color: #000;
        }

        /* Virtual Controller Styling (Famicom-like design, enlarged) */
        #virtual-controller {
            width: 100%;
            height: 190px;
            background-color: var(--fc-red);
            border-top: 4px solid #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            position: relative;
            box-sizing: border-box;
            background-image: 
                linear-gradient(to bottom, rgba(255,255,255,0.1), transparent),
                linear-gradient(to right, var(--fc-gold) 0%, var(--fc-gold) 100%);
            background-size: 100% 100%, 100% 12px;
            background-repeat: no-repeat;
            background-position: 0 0, 0 20px;
        }

        /* D-PAD (Cross Key, enlarged) */
        .dpad-container {
            position: relative;
            width: 130px;
            height: 130px;
        }

        .dpad {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110px;
            height: 110px;
        }

        .dpad-btn {
            position: absolute;
            background-color: var(--fc-dark);
            border: 2px solid #555;
            color: #888;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 0 0 5px rgba(255,255,255,0.2), 0 4px 5px rgba(0,0,0,0.4);
            touch-action: none;
        }

        .dpad-btn:active, .dpad-btn.active {
            background-color: #000;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
            color: #fff;
        }

        #btn-up { top: 0; left: 38px; width: 34px; height: 40px; border-radius: 4px 4px 0 0; border-bottom: none; }
        #btn-down { bottom: 0; left: 38px; width: 34px; height: 40px; border-radius: 0 0 4px 4px; border-top: none; }
        #btn-left { top: 38px; left: 0; width: 40px; height: 34px; border-radius: 4px 0 0 4px; border-right: none; }
        #btn-right { top: 38px; right: 0; width: 40px; height: 34px; border-radius: 0 4px 4px 0; border-left: none; }

        .dpad-center {
            position: absolute;
            top: 38px;
            left: 38px;
            width: 34px;
            height: 34px;
            background-color: var(--fc-dark);
            border: none;
            z-index: 2;
        }

        /* Action Buttons (A/B style, enlarged) */
        .action-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .action-btn {
            width: 62px;
            height: 62px;
            background-color: #a3180c;
            border: 3px solid var(--fc-dark);
            border-radius: 50%;
            box-shadow: 0 4px 5px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.3);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px #000;
            touch-action: none;
        }

        .action-btn:active, .action-btn.active {
            transform: translateY(2px);
            box-shadow: 0 2px 2px rgba(0,0,0,0.5), inset 0 4px 5px rgba(0,0,0,0.6);
            background-color: #801006;
        }

        .action-label {
            font-size: 8px;
            font-family: 'Press Start 2P', monospace;
            color: var(--fc-dark);
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Select / Start rubber buttons */
        .deco-center {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: absolute;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
        }

        .rubber-btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .rubber-btn {
            width: 32px;
            height: 10px;
            background-color: #555;
            border: 2px solid var(--fc-dark);
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 2px 2px rgba(0,0,0,0.4);
            touch-action: none;
        }

        .rubber-btn:active, .rubber-btn.active {
            background-color: #222;
            box-shadow: none;
        }

        .rubber-label {
            font-size: 6px;
            font-family: 'Press Start 2P', monospace;
            color: var(--fc-dark);
            font-weight: bold;
        }

        /* Screens overlays */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
        }

        .menu-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .menu-title {
            font-size: 24px;
            color: #fff;
            text-shadow: 2px 2px 0 #555;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.6;
            letter-spacing: 2px;
        }

        input[type="text"] {
            font-family: 'DotGothic16', sans-serif;
            font-size: 16px;
            padding: 12px;
            width: 80%;
            max-width: 300px;
            background-color: #000;
            color: #fff;
            border: 3px solid #fff;
            margin-bottom: 20px;
            text-align: center;
            outline: none;
        }

        .menu-btn {
            font-family: 'DotGothic16', sans-serif;
            background: #000;
            color: #fff;
            border: 2px solid #fff;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            margin: 8px;
            transition: all 0.2s;
            width: 80%;
            max-width: 300px;
            text-align: center;
            touch-action: manipulation;
        }

        .menu-btn:hover, .menu-btn:active {
            background: #fff;
            color: #000;
            box-shadow: 0 0 10px #fff;
        }

        #controls-info {
            margin-top: 20px;
            font-size: 11px;
            color: #a0a0cf;
            line-height: 1.8;
            text-align: center;
            max-width: 340px;
            padding: 0 10px;
        }

        #back-link {
            margin-top: 20px;
            color: #ff007f;
            text-decoration: none;
            font-size: 11px;
            border-bottom: 1px dotted #ff007f;
            padding-bottom: 2px;
        }

        #back-link:hover {
            text-shadow: 0 0 5px #ff007f;
        }

        /* Quiz HUD info */
        #quiz-hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #fff;
            pointer-events: none;
        }
        #quiz-instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            text-align: center;
            font-size: 13px;
            color: #f1c40f;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Game Screen -->
        <canvas id="gameCanvas" width="320" height="240"></canvas>
        
        <!-- HUD overlay in play mode -->
        <div id="quiz-hud" style="display: none;">
            <div id="round-title">だい 1 きゅう</div>
            <div id="runner-info"></div>
        </div>
        <div id="quiz-instructions" style="display: none;">
            SELECT:プレイをみる | B:アウト | A:セーフ
        </div>

        <!-- UI Overlay for Screens -->
        <div id="ui-overlay">
            <!-- START SCREEN -->
            <div id="screen-start" class="menu-screen">
                <div class="menu-title">ｲﾁﾙｲﾙｲｼﾝ<br>ｼﾞｬｯｼﾞﾒﾝﾄ</div>
                <input type="text" id="nickname" placeholder="なまえをいれてね" maxlength="10">
                <button class="menu-btn" onclick="startGame()">▶ ゲームスタート</button>
                <div id="controls-info">
                    【操作方法】<br>
                    下のコントローラーまたはキーボード:<br>
                    SELECT (Sキー) ➔ プレイをみる<br>
                    Bボタン (Bキー) ➔ アウトと判定<br>
                    Aボタン (Space / Aキー) ➔ セーフと判定<br>
                    START (Enter) ➔ つぎのプレイへ
                </div>
                <a href="../../index.html" id="back-link">BACK TO HUB</a>
            </div>

            <!-- RESULT SCREEN -->
            <div id="screen-result" class="menu-screen" style="display:none;">
                <div class="menu-title">しあいしゅうりょう</div>
                <div id="result-message" style="margin: 20px 0; font-size: 15px; line-height: 1.6; text-align: left; color: #fff; width: 80%;"></div>
                <button class="menu-btn" id="btn-share" onclick="shareResultImage()">▶ がぞう で シェアする</button>
                <button class="menu-btn" onclick="resetGame()">▶ もういちど ジャッジする</button>
            </div>
        </div>

        <!-- Virtual Famicom Controller -->
        <div id="virtual-controller">
            <!-- D-PAD -->
            <div class="dpad-container">
                <div class="dpad">
                    <div class="dpad-btn" id="btn-up">▲</div>
                    <div class="dpad-btn" id="btn-left">◀</div>
                    <div class="dpad-center"></div>
                    <div class="dpad-btn" id="btn-right">▶</div>
                    <div class="dpad-btn" id="btn-down">▼</div>
                </div>
            </div>

            <!-- Rubber buttons: SELECT & START -->
            <div class="deco-center">
                <div class="rubber-btn-group">
                    <div class="rubber-btn" id="btn-select"></div>
                    <div class="rubber-label">SELECT</div>
                </div>
                <div class="rubber-btn-group">
                    <div class="rubber-btn" id="btn-start"></div>
                    <div class="rubber-label">START</div>
                </div>
            </div>

            <!-- Action Buttons (A / B) -->
            <div class="action-container">
                <div class="btn-group">
                    <button class="action-btn" id="btn-b">B</button>
                    <span class="action-label">OUT</span>
                </div>
                <div class="btn-group">
                    <button class="action-btn" id="btn-a">A</button>
                    <span class="action-label">SAFE</span>
                </div>
            </div>
        </div>
    </div>

<script>
    // --- Audio System (Simple SFX synthesis) ---
    class SoundFX {
        constructor() {
            this.ctx = null;
            this.failed = false;
        }
        init() {
            if (this.failed) return;
            if (!this.ctx) {
                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    if (AudioContextClass) {
                        this.ctx = new AudioContextClass();
                    } else {
                        this.failed = true;
                    }
                } catch(e) {
                    this.failed = true;
                }
            }
        }
        playTone(freq, duration, type = 'square') {
            this.init();
            if (this.failed || !this.ctx) return;
            try {
                let now = this.ctx.currentTime;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + duration);
            } catch(e){}
        }
        playSelect() { this.playTone(660, 0.05); }
        playCorrect() {
            let now = this.ctx.currentTime;
            this.playTone(523, 0.08, 'square');
            setTimeout(() => this.playTone(659, 0.15, 'square'), 80);
        }
        playIncorrect() {
            this.playTone(220, 0.3, 'sawtooth');
        }
    }
    const sound = new SoundFX();

    // --- Game Variables & Rounds ---
    // 1st Base Position on screen (320 x 240)
    const BASE_X = 240, BASE_Y = 110;
    const RUNNER_START_X = -20, RUNNER_START_Y = 220;
    const BALL_START_X = 60, BALL_START_Y = -10;

    const roundsData = [
        { runnerName: "スズキタカノリ", speedDesc: "ふつうのそうしゃ", runnerFrames: 110, ballFrames: 105, dustMax: 24 },
        { runnerName: "ヒデノリ", speedDesc: "はしるのが はやい！", runnerFrames: 85, ballFrames: 90, dustMax: 32 },
        { runnerName: "シュウトウ", speedDesc: "しんそくのそうしゃ！", runnerBaseFrames: 50, runnerFrames: 50, ballFrames: 53, dustMax: 40 },
        { runnerName: "ピッチャーゴロ", speedDesc: "ゆるいそうこう", runnerFrames: 130, ballFrames: 120, dustMax: 20 },
        { runnerName: "ギリギリのしょうぶ", speedDesc: "いっしゅんのきわどさ！", runnerFrames: 95, ballFrames: 96, dustMax: 35 }
    ];

    let currentRound = 0;
    let score = 0;
    let playerName = "";
    const totalRounds = roundsData.length;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    
    let animId = null;
    let isAnimating = false;
    let judgmentFixed = false;
    let frameCount = 0; 
    let ballArrivalFrame = 0;
    let runnerArrivalFrame = 0;
    
    let runnerX = RUNNER_START_X, runnerY = RUNNER_START_Y;
    let ballX = BALL_START_X, ballY = BALL_START_Y;
    let trueAnswer = ""; 
    let dustRadius = 0;  
    let roundDustMax = 0; 

    // Keys mapping
    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        handleKeyboard(e.code);
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    // Setup Virtual Controller
    function setupVirtualController() {
        const mappings = {
            'btn-a': () => handleAction('SAFE'),
            'btn-b': () => handleAction('OUT'),
            'btn-select': () => handleAction('PLAY'),
            'btn-start': () => handleAction('NEXT'),
            'btn-up': () => sound.playSelect(),
            'btn-down': () => sound.playSelect(),
            'btn-left': () => sound.playSelect(),
            'btn-right': () => sound.playSelect()
        };

        for (const [btnId, action] of Object.entries(mappings)) {
            const btn = document.getElementById(btnId);
            if (!btn) continue;

            const trigger = (e) => {
                e.preventDefault();
                btn.classList.add('active');
                action();
            };

            const untrigger = (e) => {
                e.preventDefault();
                btn.classList.remove('active');
            };

            btn.addEventListener('touchstart', trigger, { passive: false });
            btn.addEventListener('touchend', untrigger, { passive: false });
            btn.addEventListener('touchcancel', untrigger, { passive: false });

            btn.addEventListener('mousedown', trigger);
            btn.addEventListener('mouseup', untrigger);
            btn.addEventListener('mouseleave', untrigger);
        }
    }

    // Keyboard handlers
    function handleKeyboard(code) {
        if (code === 'Space' || code === 'KeyA') handleAction('SAFE');
        if (code === 'KeyB') handleAction('OUT');
        if (code === 'KeyS' || code === 'ShiftLeft') handleAction('PLAY');
        if (code === 'Enter') handleAction('NEXT');
    }

    // Master Action dispatcher
    function handleAction(actionType) {
        const inStartScreen = (document.getElementById('screen-start').style.display !== 'none' && document.getElementById('ui-overlay').style.display !== 'none');
        const inResultScreen = (document.getElementById('screen-result').style.display !== 'none' && document.getElementById('ui-overlay').style.display !== 'none');
        
        if (inStartScreen) {
            if (actionType === 'NEXT') startGame();
            return;
        }
        if (inResultScreen) {
            if (actionType === 'NEXT') resetGame();
            return;
        }

        // Gameplay Active Actions
        if (actionType === 'PLAY') {
            playAnimation();
        } else if (actionType === 'OUT') {
            answer('アウト');
        } else if (actionType === 'SAFE') {
            answer('セーフ');
        } else if (actionType === 'NEXT') {
            nextRound();
        }
    }

    window.onload = () => {
        const savedName = localStorage.getItem('umpire_nickname_v2');
        if (savedName) document.getElementById('nickname').value = savedName;
        setupVirtualController();
        drawField();
    };

    function startGame() {
        const nameInput = document.getElementById('nickname').value.trim();
        if (!nameInput) { alert("なまえをいれてください"); return; }
        
        playerName = nameInput;
        localStorage.setItem('umpire_nickname_v2', playerName);

        currentRound = 0; score = 0;
        
        document.getElementById('ui-overlay').style.display = 'none';
        document.getElementById('screen-start').style.display = 'none';
        document.getElementById('quiz-hud').style.display = 'flex';
        document.getElementById('quiz-instructions').style.display = 'block';

        sound.init();
        prepareRound();
    }

    function prepareRound() {
        if (animId !== null) {
            cancelAnimationFrame(animId);
            animId = null;
        }
        isAnimating = false;
        frameCount = 0;
        roundOutcomeText = "";

        const data = roundsData[currentRound];
        document.getElementById('round-title').innerText = `だい ${currentRound + 1} きゅう`;
        document.getElementById('runner-info').innerText = `${data.runnerName} (${data.speedDesc})`;

        runnerArrivalFrame = data.runnerFrames;
        ballArrivalFrame = data.ballFrames;
        roundDustMax = data.dustMax;
        
        // Decide true answer
        if (ballArrivalFrame < runnerArrivalFrame) {
            trueAnswer = "アウト";
        } else {
            trueAnswer = "セーフ";
        }

        runnerX = RUNNER_START_X; runnerY = RUNNER_START_Y;
        ballX = BALL_START_X; ballY = BALL_START_Y;
        dustRadius = 0;
        judgmentFixed = false;

        drawField();
    }

    function playAnimation() {
        if (isAnimating || judgmentFixed) return; 
        sound.playTone(880, 0.05); // pitch start
        isAnimating = true;
        update();
    }

    function update() {
        if (!isAnimating) return;
        frameCount++;

        // Update runner position
        if (frameCount < runnerArrivalFrame) {
            runnerX = RUNNER_START_X + (BASE_X - RUNNER_START_X) * (frameCount / runnerArrivalFrame);
            runnerY = RUNNER_START_Y + (BASE_Y - RUNNER_START_Y) * (frameCount / runnerArrivalFrame);
        } else {
            // Runner runs past the base
            let overFrame = frameCount - runnerArrivalFrame;
            runnerX = BASE_X + overFrame * 2.2;
            runnerY = BASE_Y + overFrame * -1.0;
        }

        // Update ball position
        if (frameCount < ballArrivalFrame) {
            ballX = BALL_START_X + (BASE_X - BALL_START_X) * (frameCount / ballArrivalFrame);
            ballY = BALL_START_Y + (BASE_Y - BALL_START_Y) * (frameCount / ballArrivalFrame);
        } else {
            ballX = BASE_X;
            ballY = BASE_Y;
        }

        // Dust cloud effect when runner is close to base
        if (frameCount >= runnerArrivalFrame - 15) {
            let p = Math.min((frameCount - (runnerArrivalFrame - 15)) / 15, 1.0);
            dustRadius = p * roundDustMax;
        }

        // Stop animation a little after both arrive
        let maxArrival = Math.max(runnerArrivalFrame, ballArrivalFrame);
        if (frameCount >= maxArrival + 15) {
            isAnimating = false;
            judgmentFixed = true; // Wait for decision
        }

        drawField();

        if (isAnimating) {
            animId = requestAnimationFrame(update);
        }
    }

    function drawField() {
        // --- 1. Background Field ---
        ctx.fillStyle = '#227A2A'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Clay dirt around first base line
        ctx.fillStyle = '#C08A55'; 
        ctx.beginPath();
        ctx.moveTo(340, -10);  
        ctx.lineTo(-20, 150);  
        ctx.lineTo(-20, 240);
        ctx.lineTo(340, 240);
        ctx.fill();

        // --- 2. Firstbase line ---
        ctx.fillStyle = '#fff';
        for(let i=-20; i<320; i+=6) {
            ctx.fillRect(i, 160 - (i*0.45), 4, 4);
        }

        // --- 3. Base ---
        ctx.fillStyle = '#fff'; 
        ctx.fillRect(BASE_X - 12, BASE_Y - 6, 24, 12); 
        ctx.fillStyle = '#bdc3c7'; 
        ctx.fillRect(BASE_X - 12, BASE_Y + 6, 24, 4);  

        // --- 4. Dust ---
        if (dustRadius > 0) {
            ctx.fillStyle = `rgba(220, 210, 180, ${judgmentFixed ? 0.5 : 0.9})`; 
            let r = Math.floor(dustRadius);
            ctx.fillRect(BASE_X - r, BASE_Y - r/2, r*2, r);
            ctx.fillRect(BASE_X - r/2, BASE_Y - r, r, r*2);
        }

        // --- 5. Ball & Shadow ---
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; 
        ctx.fillRect(Math.floor(ballX) - 4, Math.floor(ballY) + 6, 8, 3);
        ctx.fillStyle = '#fff';
        ctx.fillRect(Math.floor(ballX) - 3, Math.floor(ballY) - 3, 6, 6);
        ctx.fillStyle = '#999'; 
        ctx.fillRect(Math.floor(ballX) - 3, Math.floor(ballY) + 3, 6, 2);

        // --- 6. Runner ---
        drawRunner(Math.floor(runnerX), Math.floor(runnerY));

        // --- 7. Scanlines ---
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        for(let y = 0; y < canvas.height; y += 3) {
            ctx.fillRect(0, y, canvas.width, 1);
        }
    }

    function drawRunner(rx, ry) {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(rx - 8, ry + 14, 16, 4);

        const animState = Math.floor(frameCount / 4) % 2; 

        // helmet/head
        ctx.fillStyle = '#f1c40f'; 
        ctx.fillRect(rx - 6, ry - 18, 12, 10);
        ctx.fillStyle = '#e67e22'; 
        ctx.fillRect(rx - 4, ry - 10, 8, 6);

        // body uniform
        ctx.fillStyle = '#2980b9';
        ctx.fillRect(rx - 8, ry - 4, 16, 12);

        // arms
        ctx.fillStyle = '#fff';
        if (animState === 0) {
            ctx.fillRect(rx - 12, ry - 6, 4, 10); 
            ctx.fillRect(rx + 8, ry - 2, 4, 8);   
        } else {
            ctx.fillRect(rx - 10, ry - 2, 4, 8);  
            ctx.fillRect(rx + 6, ry - 6, 4, 10);  
        }

        // legs
        ctx.fillStyle = '#ecf0f1';
        if (animState === 0) {
            ctx.fillRect(rx - 6, ry + 8, 6, 8);  
            ctx.fillRect(rx + 4, ry + 8, 4, 4); 
        } else {
            ctx.fillRect(rx - 2, ry + 8, 4, 4);  
            ctx.fillRect(rx + 2, ry + 8, 6, 8);  
        }
    }

    let roundOutcomeText = "";

    function answer(playerChoice) {
        if (!judgmentFixed || roundOutcomeText !== "") return;

        if (playerChoice === trueAnswer) {
            sound.playCorrect();
            roundOutcomeText = "せいかい！";
            score++;
        } else {
            sound.playIncorrect();
            roundOutcomeText = "ミスジャッジ！";
        }
        
        drawOutcomeOverlay(roundOutcomeText, trueAnswer);
    }

    function drawOutcomeOverlay(resultText, correctAnswer) {
        drawField();
        
        // Dim field background
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw dynamic timeline analysis chart (similar style to plate umpire)
        ctx.font = "14px 'DotGothic16'";
        ctx.fillStyle = resultText.includes("せいかい") ? "#2ecc71" : "#e74c3c";
        ctx.textAlign = "center";
        ctx.fillText(resultText, 160, 45);
        
        ctx.fillStyle = "#fff";
        ctx.fillText(`判定: ${correctAnswer}`, 160, 70);

        // Render timeline bar chart
        // Draw center border box
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(40, 95, 240, 80);
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(40, 95, 240, 80);

        ctx.font = "10px 'DotGothic16'";
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'left';
        ctx.fillText("タイムライン（到達フレーム）", 50, 112);

        // Draw progress bar chart
        let maxVal = Math.max(ballArrivalFrame, runnerArrivalFrame) + 15;
        let barW = 120;
        
        // Ball bar
        ctx.fillStyle = '#999';
        ctx.fillText("ボール到達:", 50, 135);
        let ballFillW = (ballArrivalFrame / maxVal) * barW;
        ctx.fillStyle = '#ff007f'; // pink
        ctx.fillRect(115, 127, ballFillW, 8);
        ctx.fillStyle = '#fff';
        ctx.fillText(`${ballArrivalFrame}F`, 120 + ballFillW, 135);

        // Runner bar
        ctx.fillStyle = '#999';
        ctx.fillText("そうしゃ着:", 50, 158);
        let runnerFillW = (runnerArrivalFrame / maxVal) * barW;
        ctx.fillStyle = '#00f0ff'; // blue
        ctx.fillRect(115, 150, runnerFillW, 8);
        ctx.fillStyle = '#fff';
        ctx.fillText(`${runnerArrivalFrame}F`, 120 + runnerFillW, 158);

        // Outcome verdict at bottom of chart
        ctx.font = "9px 'Press Start 2P'";
        ctx.fillStyle = "#f1c40f";
        ctx.textAlign = 'center';
        ctx.fillText("START: NEXT ROUND", 160, 195);
    }

    function nextRound() {
        if (roundOutcomeText === "") return;
        sound.playSelect();
        roundOutcomeText = "";
        
        currentRound++;
        if (currentRound >= totalRounds) { 
            showResult(); 
        } else { 
            prepareRound(); 
        }
    }

    function showResult() {
        document.getElementById('quiz-hud').style.display = 'none';
        document.getElementById('quiz-instructions').style.display = 'none';
        
        document.getElementById('ui-overlay').style.display = 'flex';
        document.getElementById('screen-start').style.display = 'none';
        document.getElementById('screen-result').style.display = 'flex';

        let comment = "";
        if (score === 5) comment = "めいしんぱん たんじょう！<br>どうたいしりょくは プロやきゅうのしんぱん レベル！";
        else if (score >= 3) comment = "おしい！<br>あとすこしで １ぐんのしんぱん レベルだ！";
        else if (score >= 1) comment = "まだまだ しゅぎょうが たりないようだ。";
        else comment = "だいブーイング！<br>すなぼこりに だまされすぎだぞ。";

        document.getElementById('result-message').innerHTML = 
            `＊ <strong>${playerName}</strong> 審判の成績 ＊<br><br>
            <span style="color:#e74c3c; font-size:24px;">${totalRounds}きゅう ちゅう ${score}きゅう せいかい</span><br><br>
            ${comment}`;
    }

    async function shareResultImage() {
        const btn = document.getElementById('btn-share');
        btn.innerText = "がぞう を つくっています...";
        btn.disabled = true;

        const shareCanvas = document.createElement('canvas');
        shareCanvas.width = 400;
        shareCanvas.height = 300;
        const sCtx = shareCanvas.getContext('2d');
        sCtx.imageSmoothingEnabled = false;

        sCtx.fillStyle = '#000';
        sCtx.fillRect(0, 0, 400, 300);
        sCtx.strokeStyle = '#fff';
        sCtx.lineWidth = 4;
        sCtx.strokeRect(10, 10, 380, 280);
        sCtx.strokeRect(16, 16, 368, 268);

        sCtx.font = "24px 'DotGothic16', sans-serif";
        sCtx.fillStyle = '#fff';
        sCtx.fillText("＊ 一塁塁審 ステータス ＊", 30, 60);

        sCtx.font = "20px 'DotGothic16', sans-serif";
        sCtx.fillText(`なまえ　：${playerName}`, 30, 110);
        sCtx.fillText(`せいせき：`, 30, 150);
        sCtx.fillText(`  ${totalRounds}きゅう ちゅう ${score}きゅう せいかい`, 30, 180);

        let rank = "";
        if (score === 5) rank = "伝説の名塁審";
        else if (score >= 3) rank = "１ぐん 審判員";
        else if (score >= 1) rank = "みならい 審判";
        else rank = "２ぐんおち";

        sCtx.fillStyle = '#f39c12';
        sCtx.fillText(`しょうごう：${rank}`, 30, 230);

        sCtx.fillStyle = '#ccc';
        sCtx.font = "16px 'DotGothic16', sans-serif";
        sCtx.fillText("#一塁塁審ジャッジメント", 30, 275);

        shareCanvas.toBlob(async (blob) => {
            const file = new File([blob], "judgement.png", { type: "image/png" });
            const data = {
                text: `${playerName}の判定結果！ #一塁塁審ジャッジメント`,
                files: [file]
            };

            if (navigator.canShare && navigator.canShare(data)) {
                try {
                    await navigator.share(data);
                } catch (err) {
                    console.log("キャンセルされました", err);
                }
            } else {
                alert("画像シェア非対応のため、テキストでシェアします。");
                const text = `${playerName}は １るいるいしん として はんていに いどみ、${totalRounds}もんちゅう ${score}もん せいかいした！\n#一塁塁審ジャッジメント`;
                const url = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
                window.open(url, '_blank');
            }

            btn.innerText = "▶ がぞう で シェアする";
            btn.disabled = false;
        });
    }

    function resetGame() {
        document.getElementById('screen-start').style.display = 'flex';
        document.getElementById('screen-result').style.display = 'none';
        document.getElementById('ui-overlay').style.display = 'flex';
        
        const savedName = localStorage.getItem('umpire_nickname_v2');
        if (savedName) document.getElementById('nickname').value = savedName;
        
        drawField();
    }
</script>

</body>
