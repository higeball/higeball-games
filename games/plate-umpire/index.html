<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>球審ジャッジメント | Higeball Games</title>
    <!-- Google Fonts for Retro style -->
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --fc-red: #8a1c14;
            --fc-gold: #c5a059;
            --fc-dark: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DotGothic16', sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            touch-action: none; /* Prevent browser pinch and scroll */
            overscroll-behavior: none;
        }

        #game-container {
            position: relative;
            background-color: #000;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 512px;
            display: flex;
            flex-direction: column;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            background-color: #000;
        }

        /* Virtual Controller Styling (Famicom-like design, enlarged) */
        #virtual-controller {
            width: 100%;
            height: 190px;
            background-color: var(--fc-red);
            border-top: 4px solid #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            position: relative;
            box-sizing: border-box;
            background-image: 
                linear-gradient(to bottom, rgba(255,255,255,0.1), transparent),
                linear-gradient(to right, var(--fc-gold) 0%, var(--fc-gold) 100%);
            background-size: 100% 100%, 100% 12px;
            background-repeat: no-repeat;
            background-position: 0 0, 0 20px;
        }

        /* D-PAD (Cross Key, enlarged) */
        .dpad-container {
            position: relative;
            width: 130px;
            height: 130px;
        }

        .dpad {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110px;
            height: 110px;
        }

        .dpad-btn {
            position: absolute;
            background-color: var(--fc-dark);
            border: 2px solid #555;
            color: #888;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 0 0 5px rgba(255,255,255,0.2), 0 4px 5px rgba(0,0,0,0.4);
            touch-action: none;
        }

        .dpad-btn:active, .dpad-btn.active {
            background-color: #000;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
            color: #fff;
        }

        #btn-up { top: 0; left: 38px; width: 34px; height: 40px; border-radius: 4px 4px 0 0; border-bottom: none; }
        #btn-down { bottom: 0; left: 38px; width: 34px; height: 40px; border-radius: 0 0 4px 4px; border-top: none; }
        #btn-left { top: 38px; left: 0; width: 40px; height: 34px; border-radius: 4px 0 0 4px; border-right: none; }
        #btn-right { top: 38px; right: 0; width: 40px; height: 34px; border-radius: 0 4px 4px 0; border-left: none; }

        .dpad-center {
            position: absolute;
            top: 38px;
            left: 38px;
            width: 34px;
            height: 34px;
            background-color: var(--fc-dark);
            border: none;
            z-index: 2;
        }

        /* Action Buttons (A/B style, enlarged) */
        .action-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .action-btn {
            width: 62px;
            height: 62px;
            background-color: #a3180c;
            border: 3px solid var(--fc-dark);
            border-radius: 50%;
            box-shadow: 0 4px 5px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.3);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px #000;
            touch-action: none;
        }

        .action-btn:active, .action-btn.active {
            transform: translateY(2px);
            box-shadow: 0 2px 2px rgba(0,0,0,0.5), inset 0 4px 5px rgba(0,0,0,0.6);
            background-color: #801006;
        }

        .action-label {
            font-size: 8px;
            font-family: 'Press Start 2P', monospace;
            color: var(--fc-dark);
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Select / Start rubber buttons */
        .deco-center {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: absolute;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
        }

        .rubber-btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .rubber-btn {
            width: 32px;
            height: 10px;
            background-color: #555;
            border: 2px solid var(--fc-dark);
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 2px 2px rgba(0,0,0,0.4);
            touch-action: none;
        }

        .rubber-btn:active, .rubber-btn.active {
            background-color: #222;
            box-shadow: none;
        }

        .rubber-label {
            font-size: 6px;
            font-family: 'Press Start 2P', monospace;
            color: var(--fc-dark);
            font-weight: bold;
        }

        /* Screens overlays */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
        }

        .menu-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .menu-title {
            font-size: 24px;
            color: #fff;
            text-shadow: 2px 2px 0 #555;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.6;
            letter-spacing: 2px;
        }

        input[type="text"] {
            font-family: 'DotGothic16', sans-serif;
            font-size: 16px;
            padding: 12px;
            width: 80%;
            max-width: 300px;
            background-color: #000;
            color: #fff;
            border: 3px solid #fff;
            margin-bottom: 20px;
            text-align: center;
            outline: none;
        }

        .menu-btn {
            font-family: 'DotGothic16', sans-serif;
            background: #000;
            color: #fff;
            border: 2px solid #fff;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            margin: 8px;
            transition: all 0.2s;
            width: 80%;
            max-width: 300px;
            text-align: center;
            touch-action: manipulation;
        }

        .menu-btn:hover, .menu-btn:active {
            background: #fff;
            color: #000;
            box-shadow: 0 0 10px #fff;
        }

        #controls-info {
            margin-top: 20px;
            font-size: 11px;
            color: #a0a0cf;
            line-height: 1.8;
            text-align: center;
            max-width: 340px;
            padding: 0 10px;
        }

        #back-link {
            margin-top: 20px;
            color: #ff007f;
            text-decoration: none;
            font-size: 11px;
            border-bottom: 1px dotted #ff007f;
            padding-bottom: 2px;
        }

        #back-link:hover {
            text-shadow: 0 0 5px #ff007f;
        }

        /* Quiz HUD info */
        #quiz-hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #fff;
            pointer-events: none;
        }
        #quiz-instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            text-align: center;
            font-size: 13px;
            color: #f1c40f;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Game Screen -->
        <canvas id="gameCanvas" width="320" height="240"></canvas>
        
        <!-- HUD overlay in play mode -->
        <div id="quiz-hud" style="display: none;">
            <div id="round-title">だい 1 きゅう</div>
            <div id="runner-info"></div>
        </div>
        <div id="quiz-instructions" style="display: none;">
            SELECT:プレイをみる | B:ボール | A:ストライク
        </div>

        <!-- UI Overlay for Screens -->
        <div id="ui-overlay">
            <!-- START SCREEN -->
            <div id="screen-start" class="menu-screen">
                <div class="menu-title">ｷｭｳｼﾝ<br>ｼﾞｬｯｼﾞﾒﾝﾄ</div>
                <input type="text" id="nickname" placeholder="なまえをいれてね" maxlength="10">
                <button class="menu-btn" onclick="startGame()">▶ ゲームスタート</button>
                <div id="controls-info">
                    【操作方法】<br>
                    下のコントローラーまたはキーボード:<br>
                    SELECT (Sキー) ➔ プレイをみる<br>
                    Bボタン (Bキー) ➔ ボールと判定<br>
                    Aボタン (Space / Aキー) ➔ ストライクと判定<br>
                    START (Enter) ➔ つぎのプレイへ
                </div>
                <a href="../../index.html" id="back-link">BACK TO HUB</a>
            </div>

            <!-- RESULT SCREEN -->
            <div id="screen-result" class="menu-screen" style="display:none;">
                <div class="menu-title">しあいしゅうりょう</div>
                <div id="result-message" style="margin: 20px 0; font-size: 15px; line-height: 1.6; text-align: left; color: #fff; width: 80%;"></div>
                <button class="menu-btn" id="btn-share" onclick="shareResultImage()">▶ がぞう で シェアする</button>
                <button class="menu-btn" onclick="resetGame()">▶ もういちど ジャッジする</button>
            </div>
        </div>

        <!-- Virtual Famicom Controller -->
        <div id="virtual-controller">
            <!-- D-PAD -->
            <div class="dpad-container">
                <div class="dpad">
                    <div class="dpad-btn" id="btn-up">▲</div>
                    <div class="dpad-btn" id="btn-left">◀</div>
                    <div class="dpad-center"></div>
                    <div class="dpad-btn" id="btn-right">▶</div>
                    <div class="dpad-btn" id="btn-down">▼</div>
                </div>
            </div>

            <!-- Rubber buttons: SELECT & START -->
            <div class="deco-center">
                <div class="rubber-btn-group">
                    <div class="rubber-btn" id="btn-select"></div>
                    <div class="rubber-label">SELECT</div>
                </div>
                <div class="rubber-btn-group">
                    <div class="rubber-btn" id="btn-start"></div>
                    <div class="rubber-label">START</div>
                </div>
            </div>

            <!-- Action Buttons (A / B) -->
            <div class="action-container">
                <div class="btn-group">
                    <button class="action-btn" id="btn-b">B</button>
                    <span class="action-label">BALL</span>
                </div>
                <div class="btn-group">
                    <button class="action-btn" id="btn-a">A</button>
                    <span class="action-label">STRIKE</span>
                </div>
            </div>
        </div>
    </div>

<script>
    // --- Audio System (Simple SFX synthesis) ---
    class SoundFX {
        constructor() {
            this.ctx = null;
            this.failed = false;
        }
        init() {
            if (this.failed) return;
            if (!this.ctx) {
                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    if (AudioContextClass) {
                        this.ctx = new AudioContextClass();
                    } else {
                        this.failed = true;
                    }
                } catch(e) {
                    this.failed = true;
                }
            }
        }
        playTone(freq, duration, type = 'square') {
            this.init();
            if (this.failed || !this.ctx) return;
            try {
                let now = this.ctx.currentTime;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + duration);
            } catch(e){}
        }
        playSelect() { this.playTone(660, 0.05); }
        playCorrect() {
            let now = this.ctx.currentTime;
            this.playTone(523, 0.08, 'square');
            setTimeout(() => this.playTone(659, 0.15, 'square'), 80);
        }
        playIncorrect() {
            this.playTone(220, 0.3, 'sawtooth');
        }
    }
    const sound = new SoundFX();

    // --- Game Variables & Rounds ---
    // Strike zone area on Canvas (320 x 240)
    // Left: 125, Right: 195 (width 70)
    // Top: 95, Bottom: 165 (height 70)
    const ZONE_LEFT = 125;
    const ZONE_RIGHT = 195;
    const ZONE_TOP = 95;
    const ZONE_BOTTOM = 165;

    const roundsData = [
        { type: "ストレート", desc: "ど真ん中ストレート！", path: 'straight', targetX: 160, targetY: 130, speed: 0.02, batterSide: 'left' },
        { type: "カーブ", desc: "右バッターの外角へ逃げる変化球！", path: 'curve', targetX: 115, targetY: 140, speed: 0.016, batterSide: 'right' },
        { type: "ストレート", desc: "高めのインコース直球！", path: 'straight', targetX: 190, targetY: 100, speed: 0.025, batterSide: 'left' },
        { type: "フォーク", desc: "ベース付近でガクンと落ちる！", path: 'fork', targetX: 160, targetY: 175, speed: 0.018, batterSide: 'right' },
        { type: "シュート", desc: "左バッターの内角へ食い込むスライダー！", path: 'shoot', targetX: 130, targetY: 125, speed: 0.018, batterSide: 'left' }
    ];

    let currentRound = 0;
    let score = 0;
    let playerName = "";
    const totalRounds = roundsData.length;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    
    let animId = null;
    let isAnimating = false;
    let judgmentFixed = false;
    let ballProgress = 0; // 0 (Pitcher) to 1 (Home plate)
    let ballX = 160, ballY = 60, ballRadius = 2;
    let trueAnswer = ""; 
    
    // Pitcher and Batter positions
    const PITCHER_X = 160, PITCHER_Y = 55;
    
    // Keys mapping
    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        handleKeyboard(e.code);
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    // Setup Virtual Controller
    function setupVirtualController() {
        const mappings = {
            'btn-a': () => handleAction('STRIKE'),
            'btn-b': () => handleAction('BALL'),
            'btn-select': () => handleAction('PLAY'),
            'btn-start': () => handleAction('NEXT'),
            'btn-up': () => sound.playSelect(),
            'btn-down': () => sound.playSelect(),
            'btn-left': () => sound.playSelect(),
            'btn-right': () => sound.playSelect()
        };

        for (const [btnId, action] of Object.entries(mappings)) {
            const btn = document.getElementById(btnId);
            if (!btn) continue;

            const trigger = (e) => {
                e.preventDefault();
                btn.classList.add('active');
                action();
            };

            const untrigger = (e) => {
                e.preventDefault();
                btn.classList.remove('active');
            };

            btn.addEventListener('touchstart', trigger, { passive: false });
            btn.addEventListener('touchend', untrigger, { passive: false });
            btn.addEventListener('touchcancel', untrigger, { passive: false });

            btn.addEventListener('mousedown', trigger);
            btn.addEventListener('mouseup', untrigger);
            btn.addEventListener('mouseleave', untrigger);
        }
    }

    // Keyboard handlers
    function handleKeyboard(code) {
        if (code === 'Space' || code === 'KeyA') handleAction('STRIKE');
        if (code === 'KeyB') handleAction('BALL');
        if (code === 'KeyS' || code === 'ShiftLeft') handleAction('PLAY');
        if (code === 'Enter') handleAction('NEXT');
    }

    // Master Action dispatcher
    function handleAction(actionType) {
        const inStartScreen = (document.getElementById('screen-start').style.display !== 'none' && document.getElementById('ui-overlay').style.display !== 'none');
        const inResultScreen = (document.getElementById('screen-result').style.display !== 'none' && document.getElementById('ui-overlay').style.display !== 'none');
        
        if (inStartScreen) {
            if (actionType === 'NEXT') startGame();
            return;
        }
        if (inResultScreen) {
            if (actionType === 'NEXT') resetGame();
            return;
        }

        // Gameplay Active Actions
        if (actionType === 'PLAY') {
            playAnimation();
        } else if (actionType === 'BALL') {
            answer('ボール');
        } else if (actionType === 'STRIKE') {
            answer('ストライク');
        } else if (actionType === 'NEXT') {
            nextRound();
        }
    }

    window.onload = () => {
        const savedName = localStorage.getItem('umpire_nickname_v2');
        if (savedName) document.getElementById('nickname').value = savedName;
        setupVirtualController();
        drawStaticScene();
    };

    function startGame() {
        const nameInput = document.getElementById('nickname').value.trim();
        if (!nameInput) { alert("なまえをいれてください"); return; }
        
        playerName = nameInput;
        localStorage.setItem('umpire_nickname_v2', playerName);

        currentRound = 0; score = 0;
        
        document.getElementById('ui-overlay').style.display = 'none';
        document.getElementById('screen-start').style.display = 'none';
        document.getElementById('quiz-hud').style.display = 'flex';
        document.getElementById('quiz-instructions').style.display = 'block';

        sound.init();
        prepareRound();
    }

    function prepareRound() {
        if (animId !== null) {
            cancelAnimationFrame(animId);
            animId = null;
        }
        isAnimating = false;
        ballProgress = 0;
        judgmentFixed = false;
        roundOutcomeText = "";

        const data = roundsData[currentRound];
        document.getElementById('round-title').innerText = `だい ${currentRound + 1} きゅう`;
        document.getElementById('runner-info').innerText = `${data.type} (${data.desc})`;

        // Determine true answer based on target coordinate
        let tx = data.targetX;
        let ty = data.targetY;
        let inside = (tx >= ZONE_LEFT && tx <= ZONE_RIGHT && ty >= ZONE_TOP && ty <= ZONE_BOTTOM);
        trueAnswer = inside ? "ストライク" : "ボール";

        updateBallPosition();
        drawScene();
    }

    function playAnimation() {
        if (isAnimating || judgmentFixed) return;
        sound.playTone(880, 0.05); // pitch start sound
        isAnimating = true;
        update();
    }

    function update() {
        if (!isAnimating) return;
        
        const data = roundsData[currentRound];
        ballProgress += data.speed;

        if (ballProgress >= 1.0) {
            ballProgress = 1.0;
            isAnimating = false;
            judgmentFixed = true; // Waiting for decision
        }

        updateBallPosition();
        drawScene();

        if (isAnimating) {
            animId = requestAnimationFrame(update);
        }
    }

    function updateBallPosition() {
        const data = roundsData[currentRound];
        let p = ballProgress;
        
        // Pitcher position start
        let startX = PITCHER_X;
        let startY = PITCHER_Y;
        let endX = data.targetX;
        let endY = data.targetY;

        // Visual radius increases as it approaches the screen
        ballRadius = 1 + p * 8;

        // Path curves
        if (data.path === 'straight') {
            ballX = startX + (endX - startX) * p;
            ballY = startY + (endY - startY) * p;
        } else if (data.path === 'curve') {
            // Curves to the left (viewers perspective) and enters plate
            let curveOffset = Math.sin(p * Math.PI) * -35;
            ballX = startX + (endX - startX) * p + curveOffset;
            ballY = startY + (endY - startY) * p;
        } else if (data.path === 'shoot') {
            // Curves to the right
            let curveOffset = Math.sin(p * Math.PI) * 35;
            ballX = startX + (endX - startX) * p + curveOffset;
            ballY = startY + (endY - startY) * p;
        } else if (data.path === 'fork') {
            // Drops down sharply near the plate (p > 0.7)
            let dropOffset = 0;
            if (p > 0.6) {
                let t = (p - 0.6) / 0.4; // 0 to 1
                dropOffset = t * t * 25; // drop down
            }
            ballX = startX + (endX - startX) * p;
            ballY = startY + (endY - startY) * p + dropOffset;
        }
    }

    function drawScene() {
        ctx.fillStyle = '#227A2A'; // grass
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Clay dirt around plate
        ctx.fillStyle = '#C08A55';
        ctx.beginPath();
        ctx.moveTo(30, 240);
        ctx.lineTo(290, 240);
        ctx.lineTo(230, 150);
        ctx.lineTo(90, 150);
        ctx.closePath();
        ctx.fill();

        // Home plate white lines
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.strokeRect(100, 160, 120, 60); // outline plate dirt

        // Batter boxes
        ctx.strokeRect(40, 150, 45, 80); // left box
        ctx.strokeRect(235, 150, 45, 80); // right box

        // Draw Home Plate
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(160, 205);
        ctx.lineTo(172, 215);
        ctx.lineTo(172, 225);
        ctx.lineTo(148, 225);
        ctx.lineTo(148, 215);
        ctx.closePath();
        ctx.fill();

        // Draw Pitcher Mound (small oval)
        ctx.fillStyle = '#A07040';
        ctx.beginPath();
        ctx.ellipse(160, 60, 25, 8, 0, 0, Math.PI*2);
        ctx.fill();

        // Draw Pitcher
        ctx.fillStyle = '#ff0000'; // Red team pitcher
        ctx.fillRect(PITCHER_X - 5, PITCHER_Y - 12, 10, 14); // body
        ctx.fillStyle = '#ffddaa';
        ctx.fillRect(PITCHER_X - 3, PITCHER_Y - 16, 6, 4); // head

        // Draw Batter (depending on round side)
        const data = roundsData[currentRound];
        let bx = (data.batterSide === 'left') ? 60 : 260;
        ctx.fillStyle = '#00f0ff'; // Blue team batter
        ctx.fillRect(bx - 6, 160, 12, 22); // body
        ctx.fillStyle = '#ffddaa';
        ctx.fillRect(bx - 3, 154, 6, 6); // head
        ctx.fillStyle = '#fff';
        ctx.fillRect(bx - 4, 152, 8, 2); // cap

        // Draw Bat
        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        if (data.batterSide === 'left') {
            ctx.moveTo(bx + 3, 162);
            ctx.lineTo(bx + 16, 148);
        } else {
            ctx.moveTo(bx - 3, 162);
            ctx.lineTo(bx - 16, 148);
        }
        ctx.stroke();

        // Draw Catcher (Bottom center, semi-transparent or small)
        ctx.fillStyle = 'rgba(80, 80, 80, 0.7)';
        ctx.fillRect(145, 210, 30, 25);

        // Draw Ball & Shadow (only when progress > 0)
        if (ballProgress > 0) {
            // Ball shadow on ground
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(ballX - ballRadius/2, 220, ballRadius, 2);

            // Ball body
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRadius, 0, Math.PI*2);
            ctx.fill();
        }

        // CRT scanline lines overlay
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        for(let y = 0; y < canvas.height; y += 3) {
            ctx.fillRect(0, y, canvas.width, 1);
        }
    }

    function drawStaticScene() {
        ctx.fillStyle = '#227A2A';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#C08A55';
        ctx.fillRect(50, 150, 220, 90);
        // plate outline
        ctx.fillStyle = '#fff';
        ctx.fillRect(150, 210, 20, 10);
    }

    let roundOutcomeText = "";

    function answer(playerChoice) {
        if (!judgmentFixed || roundOutcomeText !== "") return;

        if (playerChoice === trueAnswer) {
            sound.playCorrect();
            roundOutcomeText = "せいかい！";
            score++;
        } else {
            sound.playIncorrect();
            roundOutcomeText = "ミスジャッジ！";
        }
        
        drawOutcomeOverlay(roundOutcomeText, trueAnswer);
    }

    function drawOutcomeOverlay(resultText, correctAnswer) {
        drawScene();
        
        // Dim field background
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Strike Zone & pitch point
        ctx.strokeStyle = '#00f0ff';
        ctx.lineWidth = 3;
        ctx.strokeRect(ZONE_LEFT, ZONE_TOP, (ZONE_RIGHT - ZONE_LEFT), (ZONE_BOTTOM - ZONE_TOP));
        
        // Show strike zone grid line
        ctx.strokeStyle = 'rgba(0, 240, 255, 0.3)';
        ctx.lineWidth = 1;
        // horizontal lines
        ctx.strokeRect(ZONE_LEFT, ZONE_TOP + 23, (ZONE_RIGHT - ZONE_LEFT), 1);
        ctx.strokeRect(ZONE_LEFT, ZONE_TOP + 46, (ZONE_RIGHT - ZONE_LEFT), 1);
        // vertical lines
        ctx.strokeRect(ZONE_LEFT + 23, ZONE_TOP, 1, (ZONE_BOTTOM - ZONE_TOP));
        ctx.strokeRect(ZONE_LEFT + 46, ZONE_TOP, 1, (ZONE_BOTTOM - ZONE_TOP));

        // Show ball crossing point (target coordinate)
        const data = roundsData[currentRound];
        ctx.fillStyle = '#ff007f'; // neon pink dot
        ctx.beginPath();
        ctx.arc(data.targetX, data.targetY, 6, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.font = "14px 'DotGothic16'";
        ctx.fillStyle = resultText.includes("せいかい") ? "#2ecc71" : "#e74c3c";
        ctx.textAlign = "center";
        ctx.fillText(resultText, 160, 45);
        
        ctx.fillStyle = "#fff";
        ctx.fillText(`判定: ${correctAnswer}`, 160, 70);
        
        ctx.font = "9px 'Press Start 2P'";
        ctx.fillStyle = "#f1c40f";
        ctx.fillText("START: NEXT ROUND", 160, 200);
    }

    function nextRound() {
        if (roundOutcomeText === "") return;
        sound.playSelect();
        roundOutcomeText = "";
        
        currentRound++;
        if (currentRound >= totalRounds) { 
            showResult(); 
        } else { 
            prepareRound(); 
        }
    }

    function showResult() {
        document.getElementById('quiz-hud').style.display = 'none';
        document.getElementById('quiz-instructions').style.display = 'none';
        
        document.getElementById('ui-overlay').style.display = 'flex';
        document.getElementById('screen-start').style.display = 'none';
        document.getElementById('screen-result').style.display = 'flex';

        let comment = "";
        if (score === 5) comment = "めいさいばん たんじょう！<br>あばれだま も すべて みきわめた！";
        else if (score >= 3) comment = "プロレベル！<br>つねに ぶれない しんぱんだ！";
        else if (score >= 1) comment = "まだまだ しゅぎょうが たりないようだ。";
        else comment = "だいブーイング！<br>ストライクゾーンを べんきょう しなおそう。";

        document.getElementById('result-message').innerHTML = 
            `＊ <strong>${playerName}</strong> 球審の成績 ＊<br><br>
            <span style="color:#e74c3c; font-size:24px;">${totalRounds}きゅう ちゅう ${score}きゅう せいかい</span><br><br>
            ${comment}`;
    }

    async function shareResultImage() {
        const btn = document.getElementById('btn-share');
        btn.innerText = "がぞう を つくっています...";
        btn.disabled = true;

        const shareCanvas = document.createElement('canvas');
        shareCanvas.width = 400;
        shareCanvas.height = 300;
        const sCtx = shareCanvas.getContext('2d');
        sCtx.imageSmoothingEnabled = false;

        sCtx.fillStyle = '#000';
        sCtx.fillRect(0, 0, 400, 300);
        sCtx.strokeStyle = '#fff';
        sCtx.lineWidth = 4;
        sCtx.strokeRect(10, 10, 380, 280);
        sCtx.strokeRect(16, 16, 368, 268);

        sCtx.font = "24px 'DotGothic16', sans-serif";
        sCtx.fillStyle = '#fff';
        sCtx.fillText("＊ 球審 ステータス ＊", 30, 60);

        sCtx.font = "20px 'DotGothic16', sans-serif";
        sCtx.fillText(`なまえ　：${playerName}`, 30, 110);
        sCtx.fillText(`せいせき：`, 30, 150);
        sCtx.fillText(`  ${totalRounds}きゅう ちゅう ${score}きゅう せいかい`, 30, 180);

        let rank = "";
        if (score === 5) rank = "伝説の名球審";
        else if (score >= 3) rank = "１ぐん 球審";
        else if (score >= 1) rank = "みならい 球審";
        else rank = "２ぐんおち";

        sCtx.fillStyle = '#f39c12';
        sCtx.fillText(`しょうごう：${rank}`, 30, 230);

        sCtx.fillStyle = '#ccc';
        sCtx.font = "16px 'DotGothic16', sans-serif";
        sCtx.fillText("#球審ジャッジメント", 30, 275);

        shareCanvas.toBlob(async (blob) => {
            const file = new File([blob], "plate_judgement.png", { type: "image/png" });
            const data = {
                text: `${playerName}の判定結果！ #球審ジャッジメント`,
                files: [file]
            };

            if (navigator.canShare && navigator.canShare(data)) {
                try {
                    await navigator.share(data);
                } catch (err) {
                    console.log("キャンセルされました", err);
                }
            } else {
                alert("画像シェア非対応のため、テキストでシェアします。");
                const text = `${playerName}は きゅうしん として ストライク・ボールの判定にいどみ、${totalRounds}もんちゅう ${score}もん せいかいした！\n#球審ジャッジメント`;
                const url = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
                window.open(url, '_blank');
            }

            btn.innerText = "▶ がぞう で シェアする";
            btn.disabled = false;
        });
    }

    function resetGame() {
        document.getElementById('screen-start').style.display = 'flex';
        document.getElementById('screen-result').style.display = 'none';
        document.getElementById('ui-overlay').style.display = 'flex';
        
        const savedName = localStorage.getItem('umpire_nickname_v2');
        if (savedName) document.getElementById('nickname').value = savedName;
        
        drawStaticScene();
    }
</script>
